name: Docker Image Downloader
on: [workflow_dispatch] # 手动触发
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pull and Save Docker Image
        run: |
          docker pull hccz95/mattersim:all
          docker save hccz95/mattersim:all | gzip > mattersim_all.tar.gz
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mattersim-image
          path: mattersim_all.tar.gz
